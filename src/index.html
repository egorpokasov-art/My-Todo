<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>My todo</title>
  <link
    rel="stylesheet"
    href="./styles/index.css"
  >
  <script
    src="./script.js"
    defer
  ></script>
</head>
<body>
<div
  class="todo"
  data-js-todo
>
  <h1 class="todo__title">To-Do List</h1>

  <form
    class="todo__form"
    data-js-todo-new-task-form
  >
    <div class="todo__field field">
      <input
        class="todo__field-input"
        id="new-task"
        maxlength="100"
        autocomplete="off"
        placeholder=" "
        data-js-todo-new-task-input
      />
      <label
        for="new-task"
        class="todo__field-label"
      >
        New task
      </label>
      <button
        class="todo__add-new-task-button button"
        type="submit"
      >
        Add
      </button>
    </div>
  </form>
  <form
    class="todo__form"
    data-js-todo-search-task-form
  >
    <div class="todo__field field">
      <input
        class="todo__field-input"
        id="search-task"
        maxlength="40"
        autocomplete="off"
        placeholder=" "
        type="search"
        data-js-todo-search-task-input
      />
      <label
        for="search-task"
        class="todo__field-label"
      >
        Search task
      </label>
    </div>
  </form>
  <div class="todo__info">
    <div class="todo__total-tasks">Total tasks:<span data-js-todo-total-tasks>0</span>
    </div>
    <button
      class="todo__delete-all-button"
      type="button"
      data-js-todo-delete-all-button
    >
      Delete All
    </button>
  </div>
  <ul
    class="todo__list"
    data-js-todo-list
  ></ul>

  <div
    class="todo__empty-message"
    data-js-todo-empty-message
  ></div>
  <div class="todo__priority">
    <h2 class="todo__priority-title">Priority</h2>
    <ul class="todo__priority-list" data-js-todo-priority-list>
      <li class="todo__priority-item priority-item">
        <label
          class="todo__priority-label"
          for="green"
        >
          <input
            class="todo__priority-radio is-green"
            type="radio"
            name="priority"
            id="green"
            value="green"
            data-js-todo-priority-radio
          />
        </label>
      </li>
      <li class="todo__priority-item priority-item">
        <label
          class="todo__priority-label"
          for="yellow"
        >
          <input
            class="todo__priority-radio is-yellow"
            type="radio"
            name="priority"
            id="yellow"
            value="yellow"
            data-js-todo-priority-radio
          />
        </label>
      </li>
      <li class="todo__priority-item priority-item">
        <label
          class="todo__priority-label"
          for="red"
        >
          <input
            class="todo__priority-radio is-red"
            type="radio"
            name="priority"
            id="red"
            value="red"
            data-js-todo-priority-radio
          />
        </label>
      </li>
    </ul>
  </div>
</div>
</body>
</html>
