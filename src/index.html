<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>My todo</title>
  <link
    rel="stylesheet"
    href="./styles/index.css"
  >
  <script src="./todo-task.js" type="module"></script>
  <script src="./todo-model.js" type="module"></script>
  <script src="./todo-presenter.js" type="module"></script>
  <script src="./todo-ui.js" type="module"></script>
  <script src="./app.js" type="module"></script>
</head>
<body>
<div
  class="todo"
  data-js-todo
  data-theme
>
  <h1 class="todo__title" data-theme>To-Do List</h1>

  <button
    class="todo__default-theme-button"
    type="button"
    aria-label="default theme"
    data-js-default-theme-button
  >
  </button>

  <div class="todo__themes" data-js-todo-themes>
    <label
      for="theme--blue"
      class="todo__themes-label visually-hidden"
    >
      Blue theme
    </label>
    <input
      name="theme"
      type="radio"
      id="theme--blue"
      class="todo__themes-radio theme--blue"
      data-js-todo-themes-radio
    />
    <label
      for="theme--orange"
      class="todo__themes-label visually-hidden"
    >
      Orange theme
    </label>
    <input
      name="theme"
      type="radio"
      id="theme--orange"
      class="todo__themes-radio theme--orange"
      data-js-todo-themes-radio
    />
    <label
      for="theme--purple"
      class="todo__themes-label visually-hidden"
    >
      Purple theme
    </label>
    <input
      name="theme"
      type="radio"
      id="theme--purple"
      class="todo__themes-radio theme--purple"
      data-js-todo-themes-radio
    />
    <label
      for="theme--green"
      class="todo__themes-label visually-hidden"
    >
      Green theme
    </label>
    <input
      name="theme"
      type="radio"
      id="theme--green"
      class="todo__themes-radio theme--green"
      data-js-todo-themes-radio
    />
  </div>

  <form
    class="todo__form"
    data-js-todo-new-task-form
  >
    <div class="todo__field field">
      <input
        class="todo__field-input"
        id="new-task"
        maxlength="100"
        autocomplete="off"
        placeholder=" "
        data-js-todo-new-task-input
        data-theme
      />
      <label
        for="new-task"
        class="todo__field-label"
      >
        New task
      </label>
      <button
        class="todo__add-new-task-button button"
        type="submit"
        data-theme
      >
        Add
      </button>
    </div>
  </form>
  <form
    class="todo__form"
    data-js-todo-search-task-form
  >
    <div class="todo__field field">
      <input
        class="todo__field-input"
        id="search-task"
        maxlength="40"
        autocomplete="off"
        placeholder=" "
        type="search"
        data-js-todo-search-task-input
        data-theme
      />
      <label
        for="search-task"
        class="todo__field-label"
      >
        Search task
      </label>
    </div>
  </form>
  <div class="todo__info">
    <div class="todo__total-tasks">Total tasks:<span data-js-todo-total-tasks>0</span>
    </div>
    <button
      class="todo__delete-all-button"
      type="button"
      data-js-todo-delete-all-button
    >
      Delete All
    </button>
  </div>

  <div class="todo__tabs">
    <header class="todo__tabs-header">
      <ul
        class="todo__tabs-list"
        data-js-todo-tabs-list
      >
        <li class="todo__tabs-item">
          <button
            class="todo__tabs-toggle-button is-active"
            type="button"
            data-js-todo-tabs-toggle-button
            data-id="all"
            data-theme
          >
            All
          </button>
        </li>
        <li class="todo__tabs-item">
          <button
            class="todo__tabs-toggle-button"
            type="button"
            data-js-todo-tabs-toggle-button
            data-id="active"
            data-theme
          >
            Active
          </button>
        </li>
        <li class="todo__tabs__item">
          <button
            class="todo__tabs-toggle-button"
            type="button"
            data-js-todo-tabs-toggle-button
            data-id="completed"
            data-theme
          >
            Completed
          </button>
        </li>
      </ul>
    </header>
    <div class="todo__tabs-body">
      <div
        class="todo__tabs-inner is-active"
      >
        <ul
          class="todo__list"
          data-js-todo-list
        >
        </ul>
      </div>
    </div>
  </div>

  <div
    class="todo__empty-message"
    data-js-todo-empty-message
  ></div>
  <div class="todo__priority">
    <h2 class="todo__priority-title">Priority</h2>
    <ul class="todo__priority-list" data-js-todo-priority-list>
      <li class="todo__priority-item priority-item">
        <label
          class="todo__priority-label"
          for="green"
        >
          <input
            class="todo__priority-radio is-green"
            type="radio"
            name="priority"
            id="green"
            value="green"
            data-js-todo-priority-radio
          />
        </label>
      </li>
      <li class="todo__priority-item priority-item">
        <label
          class="todo__priority-label"
          for="yellow"
        >
          <input
            class="todo__priority-radio is-yellow"
            type="radio"
            name="priority"
            id="yellow"
            value="yellow"
            data-js-todo-priority-radio
          />
        </label>
      </li>
      <li class="todo__priority-item priority-item">
        <label
          class="todo__priority-label"
          for="red"
        >
          <input
            class="todo__priority-radio is-red"
            type="radio"
            name="priority"
            id="red"
            value="red"
            data-js-todo-priority-radio
          />
        </label>
      </li>
    </ul>
  </div>
</div>
</body>
</html>
