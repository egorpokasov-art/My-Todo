<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>My todo</title>
  <link
    rel="stylesheet"
    href="./styles/index.css"
  >
  <script
    src="./script.js"
    defer
  ></script>
</head>
<body>
<div
  class="todo"
  data-js-todo
>
  <h1 class="todo__title">To-Do List</h1>

  <form
    class="todo__form"
    data-js-todo-new-task-form
  >
    <div class="todo__field field">
      <input
        class="todo__field-input"
        id="new-task"
        maxlength="50"
        autocomplete="off"
        placeholder=" "
        data-js-todo-new-task-input
      />
      <label
        for="new-task"
        class="todo__field-label"
      >
        New task
      </label>
      <button
        class="todo__add-new-task-button button"
        type="submit"
      >
        Add
      </button>
    </div>
  </form>
  <form
    class="todo__form"
    data-js-todo-search-task-form
  >
    <div class="todo__field field">
      <input
        class="todo__field-input"
        id="search-task"
        maxlength="40"
        autocomplete="off"
        placeholder=" "
        type="search"
        data-js-todo-search-task-input
      />
      <label
        for="search-task"
        class="todo__field-label"
      >
        Search task
      </label>
    </div>
  </form>
  <div class="todo__info">
    <div class="todo__total-tasks">Total tasks:<span data-js-todo-total-tasks>0</span>
    </div>
    <button
      class="todo__delete-all-button"
      type="button"
      data-js-todo-delete-all-button
    >
      Delete All
    </button>
  </div>
  <ul
    class="todo__list"
    data-js-todo-list
  ></ul>
  <div
    class="todo__empty-message"
    data-js-todo-empty-message
  ></div>
</div>

<div class="div">
  <div class="elem">
    <input
      type="checkbox"
      id="${id}"
      class="input"
      data-js-todo-item-checkbox
    />
    <label
      for="${id}"
      class="label"
      data-js-label
    >
      <span
        class="preview"
      >
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Assumenda ex maxime
        necessitatibus quia repudiandae! Aut eaque est incidunt maiores minus nostrum, perferendis
        quis reprehenderit rerum similique sint soluta veniam vitae.
      </span>
      <span
        data-js-text
        class="text"
      >
        <span class="wrapper">
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Assumenda ex maxime
          necessitatibus quia repudiandae! Aut eaque est incidunt maiores minus nostrum, perferendis
          quis reprehenderit rerum similique sint soluta veniam vitae.
        </span>

    </label>

    <span class="data">Дата</span>

</div>
</body>
